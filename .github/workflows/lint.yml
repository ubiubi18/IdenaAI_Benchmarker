name: Lint and tests

on: push

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run release privacy check
        run: npm run audit:privacy

      - name: Run AI bridge tests
        run: npm test -- --runInBand main/ai-providers/bridge.test.js
